@keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:.6} }
@keyframes move-packet { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-40} }
@keyframes attack-flash { 0%,100%{opacity:1} 40%{opacity:.3} }
@keyframes shake { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-2px,0)} 75%{transform:translate(2px,0)} }
@keyframes appear { from{opacity:0;transform:scale(0.5)} to{opacity:1;transform:scale(1)} }
@keyframes fade-in { from{opacity:0} to{opacity:1} }
@media (prefers-reduced-motion: no-preference) {

}

<script>
let phase = 'normal';
let packetCount = 0;
let packetTimer = null;
let attackTimer = null;
let animFrames = [];

function log(msg, color) {
  const el = document.getElementById('log-entries');
  const t = new Date().toLocaleTimeString('en', {hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const div = document.createElement('div');
  div.style.cssText = 'font-size:11px;padding:2px 0;border-bottom:0.5px solid var(--color-border-tertiary);color:'+(color||'var(--color-text-secondary)');
  div.textContent = t+' — '+msg;
  el.insertBefore(div, el.firstChild);
}

function setAttr(id, attr, val) {
  const el = document.getElementById(id);
  if (el) el.setAttribute(attr, val);
}
function setStyle(id, prop, val) {
  const el = document.getElementById(id);
  if (el) el.style[prop] = val;
}

// Animate packet along a path (array of [x,y] waypoints)
function animatePacket(elemId, waypoints, durationPerSeg, onDone, loop) {
  const el = document.getElementById(elemId);
  if (!el) return;
  let seg = 0;
  let start = null;
  let running = true;

  function step(ts) {
    if (!running) return;
    if (!start) start = ts;
    const elapsed = ts - start;
    const progress = Math.min(elapsed / durationPerSeg, 1);
    const [x1,y1] = waypoints[seg];
    const [x2,y2] = waypoints[seg+1];
    el.setAttribute('cx', x1 + (x2-x1)*progress);
    el.setAttribute('cy', y1 + (y2-y1)*progress);
    el.setAttribute('opacity', 1);
    if (progress < 1) {
      animFrames.push(requestAnimationFrame(step));
    } else {
      seg++;
      start = null;
      if (seg < waypoints.length-1) {
        animFrames.push(requestAnimationFrame(step));
      } else {
        if (loop) { seg=0; animFrames.push(requestAnimationFrame(step)); }
        else { el.setAttribute('opacity',0); if(onDone) onDone(); }
      }
    }
  }
  animFrames.push(requestAnimationFrame(step));
  return () => { running = false; };
}

// Normal path waypoints: h1 → s1 → s2 → h2
const normalWaypoints = [[93,110],[257,110],[417,110],[583,110]];
// Attack path: h3 → s1
const attackWaypoints = [[93,220],[257,120]];
// Reroute path: s1 → s3 → h2
const rerouteWaypoints = [[257,136],[372,220],[583,130]];

let normalPacketLoop = null;

function startNormalPackets() {
  const pkt = document.getElementById('normal-packet');
  let seg = 0;
  let startTs = null;
  let running = true;
  const dur = 600;

  function step(ts) {
    if (!running) return;
    if (!startTs) startTs = ts;
    const elapsed = ts - startTs;
    const progress = Math.min(elapsed / dur, 1);
    const [x1,y1] = normalWaypoints[seg];
    const [x2,y2] = normalWaypoints[seg+1];
    pkt.setAttribute('cx', x1 + (x2-x1)*progress);
    pkt.setAttribute('cy', y1 + (y2-y1)*progress);
    pkt.setAttribute('opacity', 1);
    if (progress < 1) {
      animFrames.push(requestAnimationFrame(step));
    } else {
      seg++;
      startTs = null;
      if (seg < normalWaypoints.length-1) {
        animFrames.push(requestAnimationFrame(step));
      } else {
        seg = 0;
        pkt.setAttribute('opacity', 0);
        packetCount++;
        document.getElementById('stat-packets-val').textContent = packetCount;
        setTimeout(() => { if(running) animFrames.push(requestAnimationFrame(step)); }, 300);
      }
    }
  }
  animFrames.push(requestAnimationFrame(step));
  return () => { running = false; pkt.setAttribute('opacity',0); };
}

let stopNormal = null;

function initNormal() {
  phase = 'normal';
  log('System online — normal traffic h1 → s1 → s2 → h2', 'var(--color-text-success)');
  document.getElementById('status-label').textContent = 'Normal operation — packets flowing h1 → h2';
  document.getElementById('stat-phase-val').textContent = 'Normal';
  document.getElementById('stat-path-val').textContent = 'h1 → s1 → s2 → h2';
  document.getElementById('stat-path-val').style.color = 'var(--color-text-success)';

  // Green primary path
  ['edge-h1-s1','edge-s1-s2','edge-s2-h2'].forEach(id => {
    const e = document.getElementById(id);
    if (e) { e.setAttribute('stroke','#639922'); e.setAttribute('stroke-width','2.5'); e.removeAttribute('stroke-dasharray'); }
  });
  // Dim h3
  setAttr('node-h3','opacity','0.1');
  // Dim backup path
  ['edge-h3-s1','edge-s1-s3','edge-s3-h2'].forEach(id => {
    const e = document.getElementById(id);
    if (e) { e.setAttribute('stroke','var(--color-border-tertiary)'); e.setAttribute('stroke-width','1.5'); e.setAttribute('stroke-dasharray','4 3'); }
  });
  setAttr('reroute-group','opacity','0');
  setAttr('alert-banner','opacity','0');
  setAttr('block-x','opacity','0');
  setAttr('attack-packets','opacity','0');

  stopNormal = startNormalPackets();
}

function startAttack() {
  if (phase !== 'normal') return;
  phase = 'attacking';
  document.getElementById('btn-attack').disabled = true;
  document.getElementById('btn-attack').style.opacity = '0.4';

  log('Attack initiated — h3 starting flood attack on s1!', '#E24B4A');
  document.getElementById('status-label').textContent = 'Attack detected — h3 flooding s1 with malicious traffic';
  document.getElementById('stat-phase-val').textContent = 'Under attack';
  document.getElementById('stat-phase-val').style.color = 'var(--color-text-danger)';

  // Show h3 with animation
  const h3 = document.getElementById('node-h3');
  h3.setAttribute('opacity','1');
  h3.classList.add('appear-anim');

  // Red attack edge
  const attackEdge = document.getElementById('edge-h3-s1');
  attackEdge.setAttribute('stroke','#E24B4A');
  attackEdge.setAttribute('stroke-width','2.5');
  attackEdge.removeAttribute('stroke-dasharray');

  // Show attack packets (multiple rapid ones)
  const apkts = document.getElementById('attack-packets');
  apkts.setAttribute('opacity','1');

  // Animate attack packets h3→s1 rapidly
  let atk1 = document.getElementById('apkt1');
  let atk2 = document.getElementById('apkt2');
  let aRunning = true;
  let t1 = 0, t2 = 0.4;

  function atkStep(ts) {
    if (!aRunning) return;
    const dur = 700;
    const p1 = ((ts * 0.001 + t1) % 1);
    const p2 = ((ts * 0.001 + t2) % 1);
    atk1.setAttribute('cx', 93 + (257-93)*p1);
    atk1.setAttribute('cy', 220 + (125-220)*p1);
    atk2.setAttribute('cx', 93 + (257-93)*p2);
    atk2.setAttribute('cy', 220 + (125-220)*p2);
    animFrames.push(requestAnimationFrame(atkStep));
  }
  animFrames.push(requestAnimationFrame(atkStep));

  // Shake s1 to show it's being hit
  document.getElementById('node-s1').classList.add('shake-anim');

  // After 2.5s — detection
  setTimeout(() => {
    if (phase !== 'attacking') return;
    aRunning = false;
    document.getElementById('node-s1').classList.remove('shake-anim');
    triggerDetection();
  }, 2500);
}

function triggerDetection() {
  phase = 'detecting';
  log('AI detection: DDoS flood from 10.0.0.3 — confidence 97.3%', '#EF9F27');
  log('Blocking h3 (10.0.0.3) — dropping all traffic from attacker', '#EF9F27');

  document.getElementById('status-label').textContent = 'Attack detected — blocking h3 and computing safe reroute...';
  document.getElementById('stat-phase-val').textContent = 'Detecting & blocking';

  // Show alert banner
  const banner = document.getElementById('alert-banner');
  banner.setAttribute('opacity','1');
  banner.classList.add('pulse-red-anim');

  // Block X over h3
  setAttr('block-x','opacity','1');
  document.getElementById('block-x').classList.add('appear-anim');

  // Make attack edge dashed red (blocked)
  const attackEdge = document.getElementById('edge-h3-s1');
  attackEdge.setAttribute('stroke-dasharray','3 4');
  attackEdge.setAttribute('stroke','#E24B4A');
  attackEdge.setAttribute('stroke-width','1.5');
  setAttr('attack-packets','opacity','0');

  // After 1.5s — reroute
  setTimeout(triggerReroute, 1500);
}

function triggerReroute() {
  phase = 'rerouted';
  log('Path rerouted: h1 → s1 → s3 → h2 (backup path active)', '#378ADD');
  log('System self-healed — normal operation resumed on safe path', 'var(--color-text-success)');

  document.getElementById('status-label').textContent = 'Rerouted — traffic now flowing via backup path s3';
  document.getElementById('stat-phase-val').textContent = 'Rerouted';
  document.getElementById('stat-phase-val').style.color = 'var(--color-text-info)';
  document.getElementById('stat-path-val').textContent = 'h1 → s1 → s3 → h2';
  document.getElementById('stat-path-val').style.color = 'var(--color-text-info)';

  // Dim old green path (s1→s2→h2)
  ['edge-s1-s2','edge-s2-h2'].forEach(id => {
    const e = document.getElementById(id);
    if (e) { e.setAttribute('stroke','var(--color-border-tertiary)'); e.setAttribute('stroke-width','1.5'); e.setAttribute('stroke-dasharray','4 3'); }
  });

  // Highlight backup switch
  const s3 = document.getElementById('node-s3');
  s3.querySelector('rect').setAttribute('fill','#E6F1FB');
  s3.querySelector('rect').setAttribute('stroke','#378ADD');
  s3.querySelector('rect').setAttribute('stroke-width','2');
  s3.querySelector('rect').setAttribute('opacity','1');
  s3.setAttribute('opacity','1');

  // Show reroute path
  setAttr('reroute-group','opacity','1');
  document.getElementById('reroute-group').classList.add('fade-anim');

  // Hide alert banner
  const banner = document.getElementById('alert-banner');
  banner.classList.remove('pulse-red-anim');
  banner.setAttribute('opacity','0');

  // Stop normal packet, start reroute packet
  if (stopNormal) stopNormal();

  // Reroute packet along s1→s3→h2
  const rpkt = document.getElementById('reroute-packet');
  let rSeg = 0, rStart = null, rRunning = true;
  const rWaypoints = [[257,136],[372,220],[583,130]];

  function rStep(ts) {
    if (!rRunning) return;
    if (!rStart) rStart = ts;
    const elapsed = ts - rStart;
    const dur = 650;
    const progress = Math.min(elapsed/dur, 1);
    const [x1,y1] = rWaypoints[rSeg];
    const [x2,y2] = rWaypoints[rSeg+1];
    rpkt.setAttribute('cx', x1+(x2-x1)*progress);
    rpkt.setAttribute('cy', y1+(y2-y1)*progress);
    rpkt.setAttribute('opacity', 1);
    if (progress < 1) {
      animFrames.push(requestAnimationFrame(rStep));
    } else {
      rSeg++;
      rStart = null;
      if (rSeg < rWaypoints.length-1) {
        animFrames.push(requestAnimationFrame(rStep));
      } else {
        rSeg = 0;
        rpkt.setAttribute('opacity',0);
        packetCount++;
        document.getElementById('stat-packets-val').textContent = packetCount;
        setTimeout(() => { if(rRunning) { rStart=null; animFrames.push(requestAnimationFrame(rStep)); } }, 300);
      }
    }
  }
  animFrames.push(requestAnimationFrame(rStep));

  // Show reset button
  document.getElementById('btn-reset').style.display = 'inline-block';
}

function resetSim() {
  // Cancel all animations
  animFrames.forEach(id => cancelAnimationFrame(id));
  animFrames = [];
  if (stopNormal) stopNormal();
  stopNormal = null;
  packetCount = 0;
  document.getElementById('stat-packets-val').textContent = '0';
  document.getElementById('stat-phase-val').style.color = 'var(--color-text-primary)';
  document.getElementById('btn-attack').disabled = false;
  document.getElementById('btn-attack').style.opacity = '1';
  document.getElementById('btn-reset').style.display = 'none';
  document.getElementById('log-entries').innerHTML = '';

  // Reset node-h3 animation class
  const h3 = document.getElementById('node-h3');
  h3.classList.remove('appear-anim','shake-anim');
  document.getElementById('node-s1').classList.remove('shake-anim');

  // Reset s3 to gray
  const s3rect = document.getElementById('node-s3').querySelector('rect');
  s3rect.setAttribute('fill','#D3D1C7');
  s3rect.setAttribute('stroke','#888780');
  s3rect.setAttribute('stroke-width','1.5');

  document.getElementById('reroute-packet').setAttribute('opacity','0');
  document.getElementById('normal-packet').setAttribute('opacity','0');
  document.getElementById('attack-packets').setAttribute('opacity','0');

  initNormal();
}

initNormal();
</script>
